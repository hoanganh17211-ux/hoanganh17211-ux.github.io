<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trọng Trường | LED Profile</title>
    <link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --led: #00f2ff; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg); color: white;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden;
        }
        .container {
            width: 95%; max-width: 400px; background: rgba(20, 20, 20, 0.95);
            border: 2px solid var(--led); border-radius: 40px; padding: 30px 15px;
            text-align: center; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        #clock {
            font-family: 'Digital-7 Mono', sans-serif;
            font-size: clamp(2.5rem, 10vw, 3.8rem); color: var(--led);
            text-shadow: 0 0 10px var(--led), 0 0 20px var(--led);
            background: #000; padding: 15px; border-radius: 20px;
            margin-bottom: 20px; border: 1px solid rgba(0, 242, 255, 0.3);
        }
        .avatar {
            width: 120px; height: 120px; object-fit: cover; border-radius: 50%;
            margin: 0 auto 15px; display: block; border: 3px solid white;
            transition: 0.5s; object-position: top;
        }
        .avatar.rotating { animation: rotate 4s linear infinite; border-color: var(--led); box-shadow: 0 0 20px var(--led); }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        h1 { font-size: 1.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .sub-text { color: #94a3b8; font-size: 0.9rem; margin-bottom: 15px; }

        .marquee { width: 100%; overflow: hidden; white-space: nowrap; background: rgba(255,255,255,0.05); padding: 8px 0; margin: 15px 0; }
        .marquee span { display: inline-block; animation: scroll 15s linear infinite; color: #a78bfa; font-weight: bold; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .links { display: flex; flex-direction: column; gap: 12px; }
        .link-card {
            background: rgba(255, 255, 255, 0.05); padding: 14px; border-radius: 15px;
            text-decoration: none; color: white; display: flex; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .link-card:hover { background: var(--led); color: #000; font-weight: bold; }
        .link-card i { margin-right: 15px; font-size: 1.4rem; width: 25px; }

        .btn-play {
            margin-top: 25px; cursor: pointer; padding: 15px 40px; width: 100%;
            background: transparent; border: 2px solid var(--led); border-radius: 50px;
            color: var(--led); font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 10px var(--led); transition: 0.3s;
        }
        .btn-play.active { background: var(--led); color: #000; box-shadow: 0 0 25px var(--led); }
    </style>
</head>
<body>

    <audio id="myAudio" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="clock">00:00:00</div>
        
        <img src="https://i.imgur.com/kS94P2r.png" alt="Avatar" class="avatar" id="avatarImg">
        
        <h1>Trọng Trường</h1>
        <p class="sub-text">Học sinh lớp 9 | Web Developer 🇻🇳</p>
        
        <div class="marquee">
            <span>🇻🇳 HỖ TRỢ XEM TRÊN MÁY TÍNH & ĐIỆN THOẠI - ĐỒNG HỒ LED NEON 🇻🇳</span>
        </div>

        <div class="links">
            <a href="https://www.facebook.com/Truong12072009" target="_blank" class="link-card">
                <i class="fab fa-facebook" style="color:#1877f2"></i> Facebook Cá Nhân
            </a>
            <a href="https://www.tiktok.com/@_012di07tuoi09_" target="_blank" class="link-card">
                <i class="fab fa-tiktok"></i> Ghé thăm TikTok
            </a>
        </div>

        <button class="btn-play" id="mainBtn">NHẤN ĐỂ PHÁT NHẠC</button>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('vi-VN', { hour12: false });
            document.getElementById('clock').textContent = timeString;
        }
        setInterval(updateTime, 1000);
        updateTime();

        const audio = document.getElementById("myAudio");
        const btn = document.getElementById("mainBtn");
        const img = document.getElementById("avatarImg");
        let isPlaying = false;

        btn.onclick = () => {
            if (!isPlaying) {
                audio.play().then(() => {
                    isPlaying = true;
                    btn.innerText = "ĐANG PHÁT NHẠC...";
                    btn.classList.add('active');
                    img.classList.add('rotating');
                }).catch(() => alert("Hãy nhấn lại nút một lần nữa để kích hoạt âm thanh!"));
            } else {
                audio.pause();
                isPlaying = false;
                btn.innerText = "TIẾP TỤC PHÁT";
                btn.classList.remove('active');
                img.classList.remove('rotating');
            }
        };
    </script>
</body>
</html>
