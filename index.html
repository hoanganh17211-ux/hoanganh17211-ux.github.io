<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trọng Trường | Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; position: relative;
        }
        .container {
            width: 95%; max-width: 400px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 30px 20px; 
            text-align: center; z-index: 10; position: relative;
        }

        /* ĐỒNG HỒ LED PHÁT SÁNG */
        #clock {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.8rem; font-weight: bold; color: var(--primary);
            text-shadow: 0 0 15px var(--primary); margin-bottom: 20px; letter-spacing: 2px;
        }

        .avatar { 
            width: 90px; height: 90px; object-fit: cover; border-radius: 50%; 
            margin: 0 auto 15px; display: block; border: 3px solid var(--primary); 
            box-shadow: 0 0 15px var(--primary); 
        }

        h1 {
            background: linear-gradient(90deg, #38bdf8, #818cf8, #c084fc, #38bdf8);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradientText 3s linear infinite; font-size: 1.6rem;
        }
        @keyframes gradientText { to { background-position: 200% center; } }

        .links { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .link-card { background: rgba(255, 255, 255, 0.08); padding: 12px; border-radius: 12px; text-decoration: none; color: white; display: flex; align-items: center; transition: 0.3s; }
        .link-card:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-3px); }
        .link-card i { margin-right: 12px; color: var(--primary); }

        .music-btn {
            margin-top: 20px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px;
            padding: 10px 25px; background: rgba(56, 189, 248, 0.2); border-radius: 50px; border: 1px solid var(--primary);
        }
        .playing { animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .bubble {
            position: fixed; bottom: -100px; background: rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5); border-radius: 50%;
            pointer-events: none; z-index: 1; animation: floatUp linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-120vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
