<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trọng Trường | Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --heart-color: #ff4d6d; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; position: relative; user-select: none;
            transition: background 0.8s ease;
        }

        /* Hiệu ứng nền khi nhạc phát */
        body.music-active {
            animation: pulseBg 4s infinite alternate;
        }
        @keyframes pulseBg {
            0% { background-color: #0f172a; }
            50% { background-color: #1e1b4b; }
            100% { background-color: #2e1065; }
        }

        .container {
            width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; padding: 30px 20px; 
            text-align: center; z-index: 10; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        #clock { font-size: 2.2rem; font-weight: bold; color: var(--primary); text-shadow: 0 0 15px var(--primary); margin-bottom: 20px; font-family: 'Courier New', monospace; }
        
        .avatar { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; margin: 0 auto 15px; display: block; border: 3px solid var(--primary); box-shadow: 0 0 20px var(--primary); transition: 0.5s; }
        .avatar.playing { transform: scale(1.05); border-color: #ff4d6d; box-shadow: 0 0 30px #ff4d6d; }

        h1 { background: linear-gradient(90deg, #38bdf8, #818cf8, #c084fc, #38bdf8); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientText 3s linear infinite; font-size: 1.8rem; letter-spacing: 1px; }
        @keyframes gradientText { to { background-position: 200% center; } }

        .links { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        .link-card { background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 18px; text-decoration: none; color: white; display: flex; align-items: center; transition: 0.4s; border: 1px solid rgba(255, 255, 255, 0.05); font-weight: 600; }
        .link-card:hover { background: rgba(56, 189, 248, 0.2); transform: translateX(8px); border-color: var(--primary); }
        .link-card i { margin-right: 15px; font-size: 1.5rem; width: 30px; text-align: center; }
        
        .fa-facebook { color: #1877f2; }
        .fa-facebook-messenger { color: #00b2ff; }
        .fa-tiktok { color: #ffffff; }

        .music-btn { margin-top: 30px; cursor: pointer; display: inline-flex; align-items: center; gap: 12px; padding: 14px 35px; background: rgba(56, 189, 248, 0.2); border-radius: 50px; border: 1px solid var(--primary); transition: 0.4s; font-weight: bold; }
        .music-btn.active { background: #ff4d6d; border-color: #ff4d6d; box-shadow: 0 0 20px rgba(255, 77, 109, 0.5); }
        .spin { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .bubble { position: fixed; bottom: -100px; background: rgba(56, 189, 248, 0.15); border-radius: 50%; pointer-events: none; z-index: 1; animation: floatUp linear forwards; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 100% { transform: translateY(-120vh) scale(1.5); opacity: 0; } }
        .heart { position: fixed; color: var(--heart-color); font-size: 25px; pointer-events: none; z-index: 999; animation: heartFly 1s ease-out forwards; }
        @keyframes heartFly { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(0, -150px) scale(2); opacity: 0; } }
    </style>
</head>
<body onclick="createHeart(event)">

    <audio id="myAudio" loop preload="auto">
        <source src="https://api.vung.id.vn/music/gio_lofi.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="clock">00:00:00</div>

        <img src="https://i.imgur.com/8Km9tLL.png" alt="Avatar" class="avatar" id="avatarImg">
        
        <h1>Trọng Trường</h1>
        <p style="font-size: 0.9rem; color: #94a3b8; margin-top: 5px;">Học sinh lớp 9 | Developer 🇻🇳</p>

        <div class="links">
            <a href="https://www.facebook.com/hoanganh17211" target="_blank" class="link-card">
                <i class="fab fa-facebook"></i> Facebook
            </a>
            <a href="https://m.me/hoanganh17211" target="_blank" class="link-card">
                <i class="fab fa-facebook-messenger"></i> Messenger
            </a>
            <a href="https://www.tiktok.com/@_012di07tuoi09_" target="_blank" class="link-card">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
        </div>

        <div class="music-btn" id="musicBtn" onclick="toggleMusic(event)">
            <i class="fas fa-compact-disc" id="musicIcon"></i>
            <span id="musicText">Phát Nhạc Chill</span>
        </div>
    </div>

    <script>
        // Cập nhật đồng hồ
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('vi-VN');
        }
        setInterval(updateClock, 1000); updateClock();

        const audio = document.getElementById("myAudio");
        const musicBtn = document.getElementById("musicBtn");
        const musicIcon = document.getElementById("musicIcon");
        const avatar = document.getElementById("avatarImg");
        let isPlaying = false;

        function toggleMusic(e) {
            e.stopPropagation();
            if (isPlaying) {
                audio.pause();
                musicIcon.classList.remove('spin');
                musicBtn.classList.remove('active');
                avatar.classList.remove('playing');
                document.body.classList.remove('music-active');
                document.getElementById('musicText').innerText = "Phát Nhạc Chill";
            } else {
                audio.play().catch(() => alert("Nhấn lại nút Phát Nhạc một lần nữa nhé!"));
                musicIcon.classList.add('spin');
                musicBtn.classList.add('active');
                avatar.classList.add('playing');
                document.body.classList.add('music-active');
                document.getElementById('musicText').innerText = "Đang Chill...";
            }
            isPlaying = !isPlaying;
        }

        // Tạo bong bóng bay liên tục
        setInterval(() => {
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 30 + 10 + 'px';
            b.style.width = size; b.style.height = size;
            b.style.left = Math.random() * 100 + 'vw';
            b.style.animationDuration = Math.random() * 4 + 5 + 's';
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 8000);
        }, 500);

        // Hiệu ứng nổ tim khi click
        function createHeart(e) {
            const h = document.createElement('i');
            h.className = 'fas fa-heart heart';
            h.style.left = e.clientX - 10 + 'px';
            h.style.top = e.clientY - 10 + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1000);
        }
    </script>
</body>
</html>
