<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trọng Trường | Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px 20px; text-align: center;
        }
        .avatar { width: 80px; height: 80px; background: var(--primary); border-radius: 50%; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; }
        .links { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .link-card { background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 10px; text-decoration: none; color: white; display: flex; align-items: center; transition: 0.3s; border: 1px solid transparent; }
        .link-card:hover { border-color: var(--primary); transform: scale(1.02); }
        .link-card i { margin-right: 12px; }

        /* Nút nhạc */
        .music-btn {<div id="wave" class="wave-container">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
</div>
            margin-top: 25px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px;
            padding: 10px 20px; background: rgba(56, 189, 248, 0.2); border-radius: 50px; border: 1px solid var(--primary);
        }
        .playing { animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar">HA</div>
        <h1>Trọng Trường</h1>
        <p>Kết nối xu hướng - Lan tỏa đam mê</p>

        <div class="links">
            <a href="https://www.tiktok.com/@_012di07tuoi09_" class="link-card"><i class="fa-brands fa-tiktok"></i> TikTok của mình</a>
            <a href="https://www.facebook.com/Truong12072009" class="link-card"><i class="fa-brands fa-facebook"></i> Facebook chính chủ</a>
        </div>

        <div class="music-btn" onclick="toggleMusic()function toggleMusic() {
            var wave = document.getElementById("wave");
            if (song.paused) {
                song.play();
                text.innerHTML = "Đang Phát";
                icon.classList.add("playing");
                wave.style.display = "flex"; // Hiện sóng nhạc
            } else {
                song.pause();
                text.innerHTML = "Tạm Dừng";
                icon.classList.remove("playing");
                wave.style.display = "none"; // Ẩn sóng nhạc
            }
        }">
            <i id="music-icon" class="fa-solid fa-compact-disc"></i>
            <span id="music-text">Bật Nhạc</span>
        </div>

        <audio id="myAudio" loop>
            <source src="nhac.mp3.mp3." type="audio/mpeg">
        </audio>

        <footer style.wave-container {
            display: none;
            justify-content: center;
            align-items: flex-end;
            gap: 3px;
            height: 20px;
            margin-top: 10px;
        }
        .bar {
            width: 3px;
            background: var(--primary);
            animation: bounce 1s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { height: 5px; }
            50% { height: 20px; }
        }
        /* Tạo độ trễ cho từng cột sóng */
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        .bar:nth-child(4) { animation-delay: 0.6s; }="margin-top:20px; font-size:10px; opacity:0.5;">&copy; 2026 hoanganh17211-ux</footer>
    </div>

    <script>
        var song = document.getElementById("myAudio");
        var icon = document.getElementById("music-icon");
        var text = document.getElementById("music-text");

        function toggleMusic() {
            if (song.paused) {
                song.play().catch(e => console.log("Lỗi phát nhạc:", e));
                text.innerHTML = "Đang Phát";
                icon.classList.add("playing");
            } else {
                song.pause();
                text.innerHTML = "Tạm Dừng";
                icon.classList.remove("playing");
            }
        }
    </script>
</body>
</html>
