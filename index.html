<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoàng Anh | Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, var(--primary), #818cf8);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center; align-items: center;
            font-size: 2rem; font-weight: bold;
        }

        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 25px; }

        .links { display: flex; flex-direction: column; gap: 15px; }

        .link-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            border-color: var(--primary);
        }

        .link-card i { margin-right: 15px; font-size: 1.2rem; width: 20px; }

        footer { margin-top: 30px; font-size: 0.7rem; color: #64748b; }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar">HA</div>
        <h1>Hoàng Anh</h1>
        <p>Kết nối xu hướng - Lan tỏa đam mê</p>

        <div class="links">
            <a href="#" class="link-card">
                <i class="fa-brands fa-tiktok"></i> TikTok của mình
            </a>
            <a href="#" class="link-card">
                <i class="fa-brands fa-facebook"></i> Facebook chính chủ
            </a>
            <a href="#" class="link-card">
                <i class="fa-solid fa-code"></i> Dự án LunarBot
            </a>
        </div>

        <footer>&copy; 2009 trường-ux</footer>
    </div>

</body>
</html>
