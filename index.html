<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trọng Trường | Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden;
        }
        .container {
            width: 90%; max-width: 380px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 30px 20px; text-align: center;
        }
        .avatar { width: 110px; height: 110px; object-fit: cover; border-radius: 50%; margin: 0 auto 15px; display: block; border: 3px solid var(--primary); transition: 0.5s; object-position: top; }
        .avatar.rotating { animation: rotate 5s linear infinite; box-shadow: 0 0 30px var(--primary); }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .marquee { width: 100%; overflow: hidden; white-space: nowrap; margin: 15px 0; color: #a78bfa; font-weight: bold; font-size: 0.9rem; }
        .marquee span { display: inline-block; animation: scroll 12s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .links { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .link-card { background: rgba(255, 255, 255, 0.08); padding: 14px; border-radius: 15px; text-decoration: none; color: white; display: flex; align-items: center; }
        
        .music-btn { 
            margin-top: 25px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; 
            padding: 15px 40px; background: var(--primary); border-radius: 50px; border: none;
            font-weight: bold; color: #000; font-size: 1.1rem; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <audio id="myAudio" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <img src="https://i.imgur.com/kS94P2r.png" alt="Avatar" class="avatar" id="avatar">
        <h1>Trọng Trường</h1>
        
        <div class="marquee">
            <span>🇻🇳 Học sinh lớp 9 | Developer | Đang phát nhạc TikTok Việt Nam cực chill...</span>
        </div>

        <div class="links">
            <a href="https://www.facebook.com/Truong12072009" target="_blank" class="link-card"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://www.tiktok.com/@_012di07tuoi09_" target="_blank" class="link-card"><i class="fab fa-tiktok"></i> TikTok</a>
        </div>

        <button class="music-btn" id="playBtn">NHẤN ĐỂ NGHE NHẠC</button>
    </div>

    <script>
        const audio = document.getElementById("myAudio");
        const btn = document.getElementById("playBtn");
        const avatar = document.getElementById("avatar");

        btn.addEventListener("click", function() {
            if (audio.paused) {
                audio.play().then(() => {
                    btn.innerText = "ĐANG PHÁT...";
                    avatar.classList.add('rotating');
                    btn.style.background = "#ff4d6d";
                }).catch(error => {
                    console.log("Lỗi trình duyệt chặn nhạc:", error);
                    alert("Hãy thử nhấn lại một lần nữa hoặc kiểm tra âm lượng nhé!");
                });
            } else {
                audio.pause();
                btn.innerText = "TIẾP TỤC NGHE";
                avatar.classList.remove('rotating');
                btn.style.background = "#38bdf8";
            }
        });
    </script>
</body>
</html>
