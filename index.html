<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trọng Trường | Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; position: relative;
        }
        .container {
            width: 90%; max-width: 380px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 30px 20px; text-align: center; z-index: 10;
        }
        #clock { font-size: 2.2rem; font-weight: bold; color: var(--primary); margin-bottom: 20px; font-family: monospace; }
        .avatar { width: 110px; height: 110px; object-fit: cover; border-radius: 50%; margin: 0 auto 15px; display: block; border: 3px solid var(--primary); transition: 0.5s; object-position: top; }
        .avatar.rotating { animation: rotate 5s linear infinite; box-shadow: 0 0 30px var(--primary); }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .marquee { width: 100%; overflow: hidden; white-space: nowrap; margin: 15px 0; color: #a78bfa; font-weight: bold; }
        .marquee span { display: inline-block; animation: scroll 12s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .links { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .link-card { background: rgba(255, 255, 255, 0.08); padding: 14px; border-radius: 15px; text-decoration: none; color: white; display: flex; align-items: center; transition: 0.3s; }
        .link-card i { margin-right: 15px; font-size: 1.4rem; }
        
        .music-btn { 
            margin-top: 25px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; 
            padding: 15px 40px; background: #ff4d6d; border-radius: 50px; border: 2px solid white;
            font-weight: bold; color: white; font-size: 1.1rem; box-shadow: 0 0 15px rgba(255, 77, 109, 0.5);
        }
    </style>
</head>
<body>

    <audio id="myAudio" loop preload="auto">
        <source src="https://dl.dropboxusercontent.com/scl/fi/v6p06o68v8z9k5h6s3u7y/gio_lofi.mp3?rlkey=v6p06o68v8z9k5h6s3u7y&dl=0" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="clock">00:00:00</div>
        <img src="https://i.imgur.com/kS94P2r.png" alt="Avatar" class="avatar" id="avatar">
        <h1>Trọng Trường</h1>
        
        <div class="marquee">
            <span>🇻🇳 Học sinh lớp 9 | Developer | Đang phát nhạc TikTok Việt Nam... 🇻🇳</span>
        </div>

        <div class="links">
            <a href="https://www.facebook.com/Truong12072009" target="_blank" class="link-card"><i class="fab fa-facebook" style="color:#1877f2"></i> Facebook</a>
            <a href="https://www.tiktok.com/@_012di07tuoi09_" target="_blank" class="link-card"><i class="fab fa-tiktok"></i> TikTok</a>
        </div>

        <button class="music-btn" id="playBtn">BẬT NHẠC NGAY 🎵</button>
    </div>

    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('vi-VN');
        }
        setInterval(updateClock, 1000); updateClock();

        const audio = document.getElementById("myAudio");
        const btn = document.getElementById("playBtn");
        const avatar = document.getElementById("avatar");

        btn.addEventListener("click", function() {
            if (audio.paused) {
                audio.play().then(() => {
                    btn.innerText = "ĐANG PHÁT...";
                    avatar.classList.add('rotating');
                }).catch(e => {
                    alert("Lỗi: Bạn hãy thử load lại trang hoặc kiểm tra mạng nhé!");
                });
            } else {
                audio.pause();
                btn.innerText = "TIẾP TỤC PHÁT";
                avatar.classList.remove('rotating');
            }
        });
    </script>
</body>
</html>
