<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuổi Trẻ Gen Z | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0f172a; --accent-color: ##ff00cc; --text-color: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px 20px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .logo { width: 100px; height: 100px; background: linear-gradient(135deg, #38bdf8, #818cf8); border-radius: 50%; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: bold; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        p { color: #94a3b8; margin-bottom: 30px; font-size: 0.9rem; }
        .links { display: flex; flex-direction: column; gap: 15px; }
        .link-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 12px; text-decoration: none; color: white; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s ease; }
        .link-card:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-3px); border-color: var(--accent-color); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">GZ</div>
        <h1>Tuổi Trẻ Gen Z</h1>
        <p>Kết nối xu hướng - Lan tỏa đam mê</p>

            <a href="https://www.facebook.com/Truong12072009"> <i class="fa-brands fa-facebook"></i> Facebook </a>
            <a href="#" class="link-card"> <i class="fa-solid fa-globe"></i> YouTube </a>
        </div>
        <footer style="margin-top: 30px; font-size: 0.7rem; color: #64748b;">&copy; 2026 hoanganh17211-ux</footer>
    </div>
</body>
</html>
