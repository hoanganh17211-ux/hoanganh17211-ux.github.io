<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trọng Trường | LED Profile</title>
    <link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --led: #00f2ff; --bg: #050505; --pink: #ff00ea; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg); color: white;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow-x: hidden;
        }
        .container {
            width: 90%; max-width: 380px; background: rgba(15, 15, 15, 0.98);
            border: 2px solid var(--led); border-radius: 40px; padding: 30px 20px;
            text-align: center; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        /* ĐỒNG HỒ LED */
        #clock {
            font-family: 'Digital-7 Mono', sans-serif;
            font-size: 4rem; color: var(--led);
            text-shadow: 0 0 10px var(--led), 0 0 20px var(--led);
            background: #000; padding: 15px; border-radius: 20px;
            margin-bottom: 25px; border: 1px solid rgba(0, 242, 255, 0.3);
        }
        /* AVATAR XOAY */
        .avatar {
            width: 140px; height: 140px; object-fit: cover; border-radius: 50%;
            margin: 0 auto 15px; display: block; border: 3px solid #fff;
            transition: 0.5s;
        }
        .rotating { animation: rotate 5s linear infinite; border-color: var(--led); box-shadow: 0 0 20px var(--led); }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        h1 { font-size: 1.8rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }

        /* CHỮ CHẠY LED */
        .marquee { width: 100%; overflow: hidden; white-space: nowrap; background: rgba(255,255,255,0.05); padding: 10px 0; margin-bottom: 25px; border-top: 1px solid var(--led); border-bottom: 1px solid var(--led); }
        .marquee span { display: inline-block; animation: scroll 12s linear infinite; color: var(--pink); font-weight: bold; font-size: 1.1rem; text-shadow: 0 0 5px var(--pink); }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* NÚT MẠNG XÃ HỘI */
        .social-box { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .btn-social {
            text-decoration: none; color: white; padding: 15px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            font-weight: bold; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .btn-social:hover { transform: translateY(-3px); background: rgba(255,255,255,0.1); border-color: var(--led); }
        .btn-social i { font-size: 1.5rem; }

        /* NÚT PLAY */
        .btn-play {
            cursor: pointer; padding: 18px; width: 100%;
            background: var(--led); border: none; border-radius: 50px;
            color: #000; font-weight: 900; text-transform: uppercase;
            font-size: 1.1rem; box-shadow: 0 0 20px var(--led); transition: 0.3s;
        }
        .btn-play.active { background: var(--pink); color: #fff; box-shadow: 0 0 25px var(--pink); }
    </style>
</head>
<body>

    <audio id="myAudio" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="clock">00:00:00</div>
        
        <img src="ttps://i.imgur.com/kS94P2r.png" alt="Avatar" class="avatar" id="avatarImg">
        
        <h1>HOÀNG ANH</h1>
        
        <div class="marquee">
            <span>🚀 CHÀO MỪNG ĐẾN VỚI PROFILE CỦA Trọng Trường - SƠN LA - WEB DEVELOPER 🚀</span>
        </div>

        <div class="social-box">
            <a href="https://www.facebook.com/Truong12072009" target="_blank" class="btn-social">
                <i class="fab fa-facebook" style="color: #1877f2;"></i> FACEBOOK
            </a>
            <a href="https://www.tiktok.com/@_012di07tuoi09_" target="_blank" class="btn-social">
                <i class="fab fa-tiktok"></i> TIKTOK
            </a>
        </div>

        <button class="btn-play" id="mainBtn">BẬT LED & NHẠC 🎵</button>
    </div>

    <script>
        // Chạy đồng hồ
        function update() {
            const d = new Date();
            document.getElementById('clock').innerText = d.toLocaleTimeString('vi-VN', {hour12: false});
        }
        setInterval(update, 1000); update();

        const audio = document.getElementById("myAudio");
        const btn = document.getElementById("mainBtn");
        const img = document.getElementById("avatarImg");
        let isPlaying = false;

        btn.onclick = () => {
            if (!isPlaying) {
                audio.play().then(() => {
                    isPlaying = true;
                    btn.innerText = "ĐANG PHÁT...";
                    btn.classList.add('active');
                    img.classList.add('rotating');
                }).catch(() => alert("Bạn hãy chạm lại nút một lần nữa để quẩy nhé!"));
            } else {
                audio.pause();
                isPlaying = false;
                btn.innerText = "TIẾP TỤC PHÁT";
                btn.classList.remove('active');
                img.classList.remove('rotating');
            }
        };
    </script>
</body>
</html>
