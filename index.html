<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoàng Anh | LED Profile</title>
    <link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --led: #00f2ff; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg); color: white;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden;
        }
        .container {
            width: 95%; max-width: 400px; background: rgba(20, 20, 20, 0.95);
            border: 2px solid var(--led); border-radius: 40px; padding: 40px 20px;
            text-align: center; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        #clock {
            font-family: 'Digital-7 Mono', sans-serif;
            font-size: clamp(3rem, 12vw, 4.2rem); color: var(--led);
            text-shadow: 0 0 10px var(--led), 0 0 20px var(--led);
            background: #000; padding: 20px; border-radius: 20px;
            margin-bottom: 30px; border: 1px solid rgba(0, 242, 255, 0.3);
        }
        .avatar {
            width: 150px; height: 150px; object-fit: cover; border-radius: 50%;
            margin: 0 auto 20px; display: block; border: 3px solid white;
            transition: 0.5s; object-position: center;
        }
        .avatar.rotating { animation: rotate 4s linear infinite; border-color: var(--led); box-shadow: 0 0 20px var(--led); }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        h1 { font-size: 2rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }

        .marquee { 
            width: 100%; overflow: hidden; white-space: nowrap; 
            background: rgba(255,255,255,0.05); padding: 12px 0; 
            margin: 25px 0; border-top: 1px solid var(--led); border-bottom: 1px solid var(--led); 
        }
        .marquee span { display: inline-block; animation: scroll 15s linear infinite; color: #a78bfa; font-weight: bold; font-size: 1.1rem; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .btn-play {
            margin-top: 10px; cursor: pointer; padding: 18px 45px; width: 100%;
            background: var(--led); border: none; border-radius: 50px;
            color: #000; font-weight: 900; text-transform: uppercase;
            font-size: 1.1rem; box-shadow: 0 0 20px var(--led); transition: 0.3s;
        }
        .btn-play.active { background: #ff4d6d; color: #fff; box-shadow: 0 0 25px #ff4d6d; }
    </style>
</head>
<body>

    <audio id="myAudio" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="clock">00:00:00</div>
        
        <img src="https://i.ibb.co/Lzd76V2q/avatar.jpg" alt="Avatar" class="avatar" id="avatarImg">
        
        <h1>HOÀNG ANH</h1>
        
        <div class="marquee">
            <span>🚀 CHÀO MỪNG BẠN ĐẾN VỚI KHÔNG GIAN CỦA HOÀNG ANH - LỚP 9 - WEB DEVELOPER 🚀</span>
        </div>

        <button class="btn-play" id="mainBtn">NHẤN ĐỂ PHÁT NHẠC 🎵</button>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('vi-VN', { hour12: false });
        }
        setInterval(updateTime, 1000); updateTime();

        const audio = document.getElementById("myAudio");
        const btn = document.getElementById("mainBtn");
        const img = document.getElementById("avatarImg");
        let isPlaying = false;

        btn.onclick = () => {
            if (!isPlaying) {
                audio.play().then(() => {
                    isPlaying = true;
                    btn.innerText = "ĐANG PHÁT...";
                    btn.classList.add('active');
                    img.classList.add('rotating');
                }).catch(() => alert("Bạn hãy chạm lại nút một lần nữa để nghe nhạc nhé!"));
            } else {
                audio.pause();
                isPlaying = false;
                btn.innerText = "TIẾP TỤC PHÁT";
                btn.classList.remove('active');
                img.classList.remove('rotating');
            }
        };
    </script>
</body>
</html>
