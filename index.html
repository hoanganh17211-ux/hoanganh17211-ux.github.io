<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trọng Trường | Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --heart-color: #ff4d6d; --messenger: #0084ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; position: relative; user-select: none;
        }
        .container {
            width: 95%; max-width: 400px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 25px 20px; 
            text-align: center; z-index: 10; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* THANH TRẠNG THÁI & ĐỒNG HỒ */
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 15px; font-family: monospace; font-size: 0.85rem; color: var(--primary); }
        #clock { font-size: 2rem; font-weight: bold; color: var(--primary); text-shadow: 0 0 20px var(--primary); margin-bottom: 15px; letter-spacing: 2px; font-family: 'Courier New', monospace; }

        /* AVATAR */
        .avatar { width: 105px; height: 105px; object-fit: cover; border-radius: 50%; margin: 0 auto 15px; display: block; border: 3px solid var(--primary); box-shadow: 0 0 25px var(--primary); }

        /* TÊN GRADIENT */
        h1 { background: linear-gradient(90deg, #38bdf8, #818cf8, #c084fc, #38bdf8); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientText 3s linear infinite; font-size: 1.8rem; margin-bottom: 5px; }
        @keyframes gradientText { to { background-position: 200% center; } }

        /* NÚT LIÊN KẾT */
        .links { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .link-card { background: rgba(255, 255, 255, 0.08); padding: 14px; border-radius: 15px; text-decoration: none; color: white; display: flex; align-items: center; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.1); }
        .link-card:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-3px); border-color: var(--primary); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.2); }
        .link-card i { margin-right: 15px; font-size: 1.3rem; width: 25px; text-align: center; }
        
        /* Màu riêng cho từng icon */
        .fa-tiktok { color: #ff0050; }
        .fa-facebook { color: #1877f2; }
        .fa-facebook-messenger { color: var(--messenger); }

        /* NÚT NHẠC */
        .music-btn { margin-top: 25px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; padding: 12px 30px; background: rgba(56, 189, 248, 0.15); border-radius: 50px; border: 1px solid var(--primary); transition: 0.3s; }
        .music-btn:active { transform: scale(0.95); }
        .playing { animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* BONG BÓNG & TIM */
        .bubble { position: fixed; bottom: -100px; background: rgba(56, 189, 248, 0.2); border-radius: 50%; pointer-events: none; z-index: 1; animation: floatUp linear forwards; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { opacity: 0.8; } 100% { transform: translateY(-120vh) scale(1.2); opacity: 0; } }
        .heart { position: fixed; color: var(--heart-color); font-size: 22px; pointer-events: none; z-index: 999; animation: heartFly 1s ease-out forwards; }
        @keyframes heartFly { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(0, -120px) scale(1.6); opacity: 0; } }
    </style>
</head>
