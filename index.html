<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Game Của Tôi</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; }
        .game-card { border: 2px solid #444; padding: 20px; margin: 20px; display: inline-block; border-radius: 10px; }
        iframe { border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Chào mừng đến với Cổng Game Mini</h1>
    
    <div class="game-card">
        <h3>Game 2048</h3>
        <iframe src="https://play2048.co/" width="400" height="500"></iframe>
    </div>

    <p>Nhấn F5 để tải lại nếu game chưa hiện!</p>
</body>
</html>
