<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoàng Anh Profile</title>
    <link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { width: 90%; max-width: 350px; border: 2px solid #00f2ff; border-radius: 30px; padding: 25px; box-shadow: 0 0 20px #00f2ff; }
        
        /* Đồng hồ LED */
        #clock { font-family: 'Digital-7 Mono', sans-serif; font-size: 3.5rem; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; margin-bottom: 20px; }
        
        /* Avatar - Dùng link trực tiếp từ ảnh bạn đã upload */
        .avatar { width: 130px; height: 130px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; margin-bottom: 15px; }
        .rotating { animation: xoay 5s linear infinite; }
        @keyframes xoay { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h1 { font-size: 1.5rem; letter-spacing: 2px; }

        /* Chữ chạy */
        .run-text { overflow: hidden; white-space: nowrap; background: #111; padding: 10px; margin: 15px 0; border: 1px solid #333; }
        .run-text span { display: inline-block; animation: move 10s linear infinite; color: #ff00ea; font-weight: bold; }
        @keyframes move { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Nút bấm to, dễ chạm trên điện thoại */
        .btn { background: #00f2ff; color: #000; border: none; padding: 15px; width: 100%; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

    <audio id="nhac" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <div class="box">
        <div id="clock">00:00:00</div>
        
        <img src="https://i.imgur.com/kS94P2r.png" class="avatar" id="avt">
        
        <h1>HOÀNG ANH</h1>

        <div class="run-text">
            <span>🚀 CHÀO MỪNG BẠN ĐẾN VỚI PROFILE CỦA HOÀNG ANH 🚀</span>
        </div>

        <button class="btn" onclick="play()">BẬT NHẠC NGAY 🎵</button>
    </div>

    <script>
        // Chạy đồng hồ
        function time() {
            let d = new Date();
            document.getElementById('clock').innerText = d.toLocaleTimeString('vi-VN', {hour12: false});
        }
        setInterval(time, 1000); time();

        // Xử lý nhạc
        let a = document.getElementById("nhac");
        let b = document.getElementById("avt");
        function play() {
            if (a.paused) {
                a.play();
                b.classList.add("rotating");
                document.querySelector(".btn").innerText = "ĐANG PHÁT...";
            } else {
                a.pause();
                b.classList.remove("rotating");
                document.querySelector(".btn").innerText = "TIẾP TỤC PHÁT";
            }
        }
    </script>
</body>
</html>
