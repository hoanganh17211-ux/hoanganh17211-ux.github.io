<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuổi Trẻ Gen Z | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0f172a; --accent-color: #38bdf8; --text-color: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; overflow-x: hidden; }
        .container { width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px 20px; text-align: center; position: relative; z-index: 10; }
        .logo { width: 100px; height: 100px; background: linear-gradient(135deg, #38bdf8, #818cf8); border-radius: 50%; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: bold; }
        .links { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        .link-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 12px; text-decoration: none; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .link-card:hover { transform: translateY(-3px); border-color: var(--accent-color); background: rgba(255, 255, 255, 0.1); }
        .music-btn { margin-top: 25px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; padding: 10px 20px; background: rgba(56, 189, 248, 0.2); border-radius: 50px; border: 1px solid var(--accent-color); transition: 0.3s; position: relative; }
        
        /* Hiệu ứng đĩa quay */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .playing { animation: spin 2s linear infinite; }

        /* Hiệu ứng trái tim bay */
        .heart {
            position: fixed;
            color: #ff4d6d;
            font-size: 20px;
            pointer-events: none;
            z-index: 9999;
            animation: flyUp 2s linear forwards;
        }
        @keyframes flyUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">GZ</div>
        <h1>Tuổi Trẻ Gen Z</h1>
        <p>Kết nối xu hướng - Lan tỏa đam mê</p>
        <div class="links">
            <a href="https://www.tiktok.com/@_012di07tuoi09_" class="link-card"><i class="fa-brands fa-tiktok"></i> TikTok</a>
            <a href="https://www.facebook.com/Truong12072009" class="link-card"><i class="fa-brands fa-facebook"></i> Facebook</a>
        </div>
        <div class="music-btn" id="btn-music" onclick="toggleMusic()">
            <i id="music-icon" class="fa-solid fa-compact-disc"></i>
            <span id="music-text">Bật Nhạc</span>
        </div>
        <audio id="myAudio" loop><source src="nhac.mp3.mp3" type="audio/mpeg">
        <footer style="margin-top: 30px; font-size: 0.7rem; color: #64748b;">&copy; 2026 hoanganh17211-ux</footer>
    </div>
<script>
    var song = document.getElementById("myAudio");
    var icon = document.getElementById("music-icon");
    var text = document.getElementById("music-text");
    var heartInterval;

    function toggleMusic() {
        if (song.paused) { 
            song.play(); 
            text.innerHTML = "Đang Phát"; 
            icon.classList.add("playing");
            // Tự động tạo tim mỗi 0.5 giây
            heartInterval = setInterval(createHeart, 500);
        } else { 
            song.pause(); 
            text.innerHTML = "Tạm Dừng"; 
            icon.classList.remove("playing"); 
            // Dừng tạo tim
            clearInterval(heartInterval);
        }
    }

    function createHeart() {
        const heart = document.createElement('i');
        heart.className = 'fa-solid fa-heart heart';
        heart.style.left = (Math.random() * 60 + 20) + '%'; 
        heart.style.bottom = '20%'; 
        document.body.appendChild(heart);
        
        setTimeout(() => {
            heart.remove();
        }, 2000);
    }
</script>
